<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colpik.js</title>
<link rel="stylesheet" href="colpik.css">
<style>

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.1rem;
  /* nice colourful bg so the glass effect is visible */
  background:
    radial-gradient(ellipse at 20% 30%, #3b1f6e 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, #0f4c75 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, #1a1a2e 0%, transparent 60%),
    #0d0d1a;
  font-family: Inter, system-ui, sans-serif;
  transition: background .4s ease;
}

h3 {
  color: rgba(255,255,255,.45);
  font-size: .7rem;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin: 0 0 .35rem;
}

.trigger-btn {
  border: none;
  padding: .75rem 1.3rem;
  border-radius: .85rem;
  font-size: .9rem;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  box-shadow: 0 6px 20px rgba(37,99,235,.3);
  font-family: inherit;
  transition: transform .12s, box-shadow .12s;
}
.trigger-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(37,99,235,.35);
}

.demo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .65rem;
  width: min(90vw, 340px);
}

.demo-card {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: .85rem;
  padding: .75rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: .45rem;
  backdrop-filter: blur(6px);
}

.demo-card button {
  border: none;
  padding: .45rem .85rem;
  border-radius: .65rem;
  font-size: .75rem;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  font-family: inherit;
}

.info {
  color: rgba(255,255,255,.35);
  font-size: .75rem;
  text-align: center;
}

</style>
</head>
<body>

<!-- 1. Default — glass with defaults -->
<h3>Glass theme (default)</h3>
<button id="openDefault" class="trigger-btn">Open Colpik.js</button>
<p class="info">APPLY changes the background · glass theme is default</p>

<!-- 2. Variant demos -->
<div class="demo-grid">

  <div class="demo-card">
    <h3>More transparent</h3>
    <button id="openTrans">transparency: 60</button>
  </div>

  <div class="demo-card">
    <h3>Heavy blur</h3>
    <button id="openBlur">blur: 32</button>
  </div>

  <div class="demo-card">
    <h3>Dark theme</h3>
    <button id="openDark">Dark</button>
  </div>

  <div class="demo-card">
    <h3>Light theme</h3>
    <button id="openLight">Light</button>
  </div>

</div>

<script src="colpik.js"></script>
<script>

/* ── 1. Default glass ── */
const pickerDefault = new Colpik({
  el: '#openDefault',
  theme: 'glass',
  /* transparency & blur are optional — these are the baked-in defaults */
  // transparency: 18,
  // blur: 16,
  format: 'hex',
  onPick(c) { document.body.style.background = c.hex; }
});

/* ── 2. More transparent glass ── */
const pickerTrans = new Colpik({
  el: '#openTrans',
  theme: 'glass',
  transparency: 60,
  blur: 16,
  onPick(c) { document.body.style.background = c.hex; }
});

/* ── 3. Heavy blur glass ── */
const pickerBlur = new Colpik({
  el: '#openBlur',
  theme: 'glass',
  transparency: 18,
  blur: 32,
  onPick(c) { document.body.style.background = c.hex; }
});

/* ── 4. Dark ── */
const pickerDark = new Colpik({
  el: '#openDark',
  theme: 'dark',
  onPick(c) { document.body.style.background = c.hex; }
});

/* ── 5. Light ── */
const pickerLight = new Colpik({
  el: '#openLight',
  theme: 'light',
  onPick(c) { document.body.style.background = c.hex; }
});

</script>
</body>
</html>
